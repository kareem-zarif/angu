<div class="container mx-auto px-4 py-8 text-center">
  <h1 class="text-2xl font-bold text-red-600 mb-4">Payment Cancelled</h1>
  <p class="text-gray-600">Your payment was cancelled. You can try again from your cart.</p>
  <button
    (click)="goToCart()"
    class="mt-4 bg-[#483C21] text-white px-6 py-2 rounded-lg hover:bg-[#362d19]"
  >
    Return to Cart
  </button>
</div>
