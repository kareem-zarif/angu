<div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-4">
  <div *ngFor="let product of recommendedProducts" class="rounded-xl shadow-md bg-white p-4">
    <!-- <img [src]="product.imageUrl" alt="{{product.name}}" class="w-full h-40 object-cover rounded-lg mb-2"> -->
    <h3 class="text-lg font-bold">{{ product.name }}</h3>
    <p class="text-gray-700">{{ product.description }}</p>
    <p class="text-blue-600 font-semibold mt-2">{{ product.pricePerPiece| currency:'EGP' }}</p>
  </div>
</div>
