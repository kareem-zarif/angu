<h2 class="text-xl font-bold mb-4">Recommendations For You</h2>

<div class="grid grid-cols-1 md:grid-cols-6 gap-4 ms-5">
  <div *ngFor="let product of recommendations"
       class="p-4 shadow rounded-lg bg-white flex flex-col items-center text-center
              transform transition duration-300 hover:scale-102 hover:shadow-lg">

    <img [src]="getProductImage(product)"
         [alt]="product.name"
         class="h-40 object-cover rounded mb-2">

    <h3 class="font-semibold text-lg">{{ product.name }}</h3>
    <p class="text-sm text-gray-600">{{ product.description }}</p>
    <p class="text-blue-600 font-bold mt-2">{{ product.pricePerPiece | currency:'EGP' }}</p>
  </div>
</div>
