<form 
  [formGroup]="reviewForm" 
  (ngSubmit)="submitReview()" 
  class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 space-y-4 w-full"
>
  <!-- Success Message -->
  <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded relative">
    <span class="block sm:inline">{{ successMessage }}</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded relative">
    <span class="block sm:inline">{{ errorMessage }}</span>
  </div>

  <!-- Rating -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Rating *</label>
    <input 
      type="number" 
      formControlName="rating" 
      min="1" 
      max="5"
      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
      [class.border-red-500]="reviewForm.get('rating')?.invalid && reviewForm.get('rating')?.touched"
    >
    <div *ngIf="reviewForm.get('rating')?.invalid && reviewForm.get('rating')?.touched" class="text-red-500 text-xs mt-1">
      Please select a rating between 1 and 5.
    </div>
  </div>

  <!-- Comment -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Comment *</label>
    <textarea 
      formControlName="comment" 
      rows="3"
      placeholder="Share your experience with this product (minimum 10 characters)"
      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
      [class.border-red-500]="reviewForm.get('comment')?.invalid && reviewForm.get('comment')?.touched"
    ></textarea>
    <div *ngIf="reviewForm.get('comment')?.invalid && reviewForm.get('comment')?.touched" class="text-red-500 text-xs mt-1">
      <div *ngIf="reviewForm.get('comment')?.errors?.['required']">Comment is required.</div>
      <div *ngIf="reviewForm.get('comment')?.errors?.['minlength']">Comment must be at least 10 characters long.</div>
    </div>
    <div *ngIf="reviewForm.get('comment')?.valid" class="text-gray-500 text-xs mt-1">
      {{ reviewForm.get('comment')?.value?.length || 0 }}/10 characters minimum
    </div>
  </div>

  <!-- Submit -->
  <div class="text-right">
    <button 
      type="submit" 
      [disabled]="!canSubmitReview()"
      class="bg-yellow-400 hover:bg-yellow-500 disabled:bg-gray-300 disabled:cursor-not-allowed text-white px-6 py-2 rounded-lg shadow-sm text-sm font-medium transition-colors duration-200"
    >
      <span *ngIf="isSubmitting" class="flex items-center">
        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Submitting...
      </span>
      <span *ngIf="!isSubmitting">Submit Review</span>
    </button>
  </div>

  <!-- Login Required Message -->
  <div *ngIf="!loggedInCustomerId" class="text-center text-gray-500 text-sm">
    Please <a routerLink="/login" class="text-yellow-600 hover:text-yellow-700 underline">log in</a> to submit a review.
  </div>
</form>
