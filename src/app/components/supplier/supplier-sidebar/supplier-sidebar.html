<div class="sidebar-filters">
  <!-- Categories Dropdown -->
  <div class="mb-6">
    <div class="flex justify-between items-center cursor-pointer" (click)="toggleCategories()">
      <h3 class="font-bold text-lg" style="color: #483C21;">الفئات</h3>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-4 h-4 transition-transform" [ngClass]="{'rotate-180': categoriesOpen}">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </div>
    <div *ngIf="categoriesOpen" class="mt-2">
      <app-nested-category-dropdown (categorySelected)="onCategorySelected($event)"
        (subCategorySelected)="onSubCategorySelected($event)">
      </app-nested-category-dropdown>
    </div>
  </div>

  <!-- Best Sellers Dropdown -->
  <div class="mb-6">
    <div class="flex justify-between items-center cursor-pointer" (click)="toggleBestSellers()">
      <h3 class="font-bold text-lg" style="color: #483C21;">Best Sellers</h3>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-4 h-4 transition-transform" [ngClass]="{'rotate-180': bestSellersOpen}">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </div>
    <div *ngIf="bestSellersOpen" class="mt-2 pl-2 border-l-2 border-gray-200">
      <div class="text-sm text-gray-600">Best selling suppliers will appear here</div>
    </div>
  </div>

  <!-- New Releases Dropdown -->
  <div class="mb-6">
    <div class="flex justify-between items-center cursor-pointer" (click)="toggleNewReleases()">
      <h3 class="font-bold text-lg" style="color: #483C21;">New Release</h3>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-4 h-4 transition-transform" [ngClass]="{'rotate-180': newReleasesOpen}">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </div>
    <div *ngIf="newReleasesOpen" class="mt-2 pl-2 border-l-2 border-gray-200">
      <div class="text-sm text-gray-600">New suppliers will appear here</div>
    </div>
  </div>

  <!-- Last Viewed Link -->
  <div class="mb-6">
    <div class="flex items-center cursor-pointer" (click)="toggleLastViewed()">
      <h3 class="font-bold text-lg"
        [ngClass]="{'text-[#483C21] font-bold': lastViewedActive, 'text-gray-700': !lastViewedActive}">Last Viewed</h3>
    </div>
  </div>

  <!-- Customer Review / Rating Filter -->
  <div class="mb-6">
    <h3 class="font-bold text-lg mb-2" style="color: #483C21;">Customer Review</h3>
    <div class="flex flex-col gap-1">
      <button class="flex items-center gap-1 text-gray-700 hover:text-[#483C21] cursor-pointer"
        [ngClass]="{'text-[#483C21] font-semibold': selectedRating === 4}" (click)="setRatingFilter(4)">
        <span class="flex text-yellow-400">
          <ng-container *ngFor="let i of [1,2,3,4]">
            <svg xmlns='http://www.w3.org/2000/svg' fill='currentColor' class='w-4 h-4' viewBox='0 0 16 16'>
              <path
                d='M8 12.146l-3.717 2.325.712-4.163-3.03-2.949 4.174-.606L8 2.223l1.861 3.78 4.174.606-3.03 2.949.712 4.163z' />
            </svg>
          </ng-container>
        </span>
        &amp; Up
      </button>

      <button class="flex items-center gap-1 text-gray-700 hover:text-[#483C21] cursor-pointer"
        [ngClass]="{'text-[#483C21] font-semibold': selectedRating === 3}" (click)="setRatingFilter(3)">
        <span class="flex text-yellow-400">
          <ng-container *ngFor="let i of [1,2,3]">
            <svg xmlns='http://www.w3.org/2000/svg' fill='currentColor' class='w-4 h-4' viewBox='0 0 16 16'>
              <path
                d='M8 12.146l-3.717 2.325.712-4.163-3.03-2.949 4.174-.606L8 2.223l1.861 3.78 4.174.606-3.03 2.949.712 4.163z' />
            </svg>
          </ng-container>
        </span>
        &amp; Up
      </button>

      <button class="flex items-center gap-1 text-gray-700 hover:text-[#483C21] cursor-pointer"
        [ngClass]="{'text-[#483C21] font-semibold': selectedRating === 2}" (click)="setRatingFilter(2)">
        <span class="flex text-yellow-400">
          <ng-container *ngFor="let i of [1,2]">
            <svg xmlns='http://www.w3.org/2000/svg' fill='currentColor' class='w-4 h-4' viewBox='0 0 16 16'>
              <path
                d='M8 12.146l-3.717 2.325.712-4.163-3.03-2.949 4.174-.606L8 2.223l1.861 3.78 4.174.606-3.03 2.949.712 4.163z' />
            </svg>
          </ng-container>
        </span>
        &amp; Up
      </button>

      <button class="flex items-center gap-1 text-gray-700 hover:text-[#483C21] cursor-pointer"
        [ngClass]="{'text-[#483C21] font-semibold': selectedRating === 1}" (click)="setRatingFilter(1)">
        <span class="flex text-yellow-400">
          <ng-container *ngFor="let i of [1]">
            <svg xmlns='http://www.w3.org/2000/svg' fill='currentColor' class='w-4 h-4' viewBox='0 0 16 16'>
              <path
                d='M8 12.146l-3.717 2.325.712-4.163-3.03-2.949 4.174-.606L8 2.223l1.861 3.78 4.174.606-3.03 2.949.712 4.163z' />
            </svg>
          </ng-container>
        </span>
        &amp; Up
      </button>

      <button class="flex items-center gap-1 text-gray-700 hover:text-[#483C21] cursor-pointer"
        [ngClass]="{'text-[#483C21] font-semibold': selectedRating === null}" (click)="setRatingFilter(null)">
        All Ratings
      </button>
    </div>
  </div>

  <!-- Warranty Filter -->
  <div class="mb-6">
    <h3 class="font-bold text-lg mb-2" style="color: #483C21;">Warranty</h3>
    <div class="flex flex-col gap-1">
      <div *ngFor="let option of warrantyOptions" class="flex items-center">
        <input type="radio" [id]="'warranty-' + option.value" name="warranty" [value]="option.value"
          [checked]="selectedWarranty === option.value" (change)="setWarrantyFilter(option.value)"
          class="form-radio h-4 w-4 text-[#483C21] transition duration-150 ease-in-out" />
        <label [for]="'warranty-' + option.value" class="ml-2 text-sm text-gray-700 cursor-pointer">
          {{ option.label }}
        </label>
      </div>
      <button class="text-sm text-gray-700 hover:text-[#483C21] cursor-pointer mt-1" (click)="setWarrantyFilter(null)">
        Clear
      </button>
    </div>
  </div>

  <!-- Address Filter -->
  <div class="mb-6">
    <h3 class="font-bold text-lg mb-2" style="color: #483C21;">Address</h3>

    <!-- Loading state -->
    <div *ngIf="loading" class="flex items-center justify-center py-2">
      <div class="animate-spin rounded-full h-4 w-4 border-t-2 border-b-2" style="border-color: #483C21;"></div>
    </div>

    <!-- Error state -->
    <div *ngIf="error" class="text-red-500 text-sm mb-2">
      {{ error }}
    </div>

    <!-- Governorate Filter -->
    <div class="mb-3">
      <label class="block text-sm font-medium text-gray-700 mb-1">Governorate</label>
      <select
        class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-[#483C21] focus:border-[#483C21] text-sm"
        (change)="setStateFilter($any($event.target).value)">
        <option value="">All Governorates</option>
        <option *ngFor="let governorate of states" [value]="governorate">{{ governorate }}</option>
      </select>
    </div>

    <!-- City Filter -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
      <select
        class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-[#483C21] focus:border-[#483C21] text-sm"
        (change)="setCityFilter($any($event.target).value)">
        <option value="">All Cities</option>
        <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
      </select>
    </div>
  </div>

  <!-- Shipping Filter -->
  <div class="mb-6">
    <h3 class="font-bold text-lg mb-2" style="color: #483C21;">Shipping</h3>
    <div class="flex flex-col gap-1">
      <div *ngFor="let option of shippingOptions" class="flex items-center">
        <input type="radio" [id]="'shipping-' + option.value" name="shipping" [value]="option.value"
          [checked]="selectedShipping === option.value" (change)="setShippingFilter(option.value)"
          class="form-radio h-4 w-4 text-[#483C21] transition duration-150 ease-in-out" />
        <label [for]="'shipping-' + option.value" class="ml-2 text-sm text-gray-700 cursor-pointer">
          {{ option.label }}
        </label>
      </div>
      <button class="text-sm text-gray-700 hover:text-[#483C21] cursor-pointer mt-1" (click)="setShippingFilter(null)">
        Clear
      </button>
    </div>
  </div>

  <!-- Reset Filters Button -->
  <div class="mb-6">
    <button (click)="resetFilters()"
      class="w-full py-2 px-4 border border-[#483C21] text-[#483C21] rounded-md hover:bg-[#483C21] hover:text-white transition-colors duration-200">
      Reset Filters
    </button>
  </div>
</div>
