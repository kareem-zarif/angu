<br>
<div class="max-w-xl mx-auto p-6 bg-gradient-to-br from-orange-50 to-white rounded-2xl shadow-lg border border-orange-100">

  <!-- العنوان -->
  <h2 class="text-2xl font-bold text-orange-700 mb-4 text-center">🤖 اسأل خدمة العملاء</h2>

  <!-- الأسئلة الثابتة -->
  <div class="mb-4 flex flex-wrap gap-2 justify-center">
    <button *ngFor="let q of presetQuestions"
            (click)="selectQuestion(q)"
            class="bg-orange-100 hover:bg-orange-200 text-orange-800 px-4 py-1.5 rounded-full text-sm font-medium transition">
      {{ q }}
    </button>
  </div>

  <!-- مربع الكتابة -->
  <textarea [(ngModel)]="question"
            placeholder="✍️ اكتب سؤالك هنا..."
            rows="3"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none mb-4"></textarea>

  <!-- زر الإرسال -->
  <button (click)="sendQuestion()"
          [disabled]="loading"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold px-4 py-2 rounded-lg shadow-md transition">
    {{ loading ? '⏳ جاري المعالجة...' : '📩 إرسال' }}
  </button>

  <!-- عرض الإجابة -->
  <div *ngIf="answer" class="mt-4 p-4 bg-orange-50 border border-orange-200 rounded-lg shadow-sm">
    <strong class="text-orange-700">📢 الإجابة:</strong>
    <p class="mt-1 text-gray-800">{{ answer }}</p>
  </div>
</div>
<br>
