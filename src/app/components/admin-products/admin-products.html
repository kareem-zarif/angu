<div class="p-6">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Product List</h2>
    <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700" (click)="openAdd()">+ Add Product</button>
  </div>
  <div class="flex items-center gap-2 mb-4">
    <input type="text" class="border rounded px-3 py-1 w-64 focus:outline-none focus:ring-2 focus:ring-orange-400" placeholder="Search..." [(ngModel)]="searchQuery" (input)="onSearch()" />
  </div>
  <div class="overflow-x-auto rounded shadow bg-white">
    <table class="min-w-full text-sm">
      <thead>
        <tr class="bg-gray-100">
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('id')">NO.</th>
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('name')">Name</th>
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('description')">Description</th>
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('pricePerPiece')">Price</th>
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('noInStock')">Stock</th>
          <th class="px-3 py-2 cursor-pointer" (click)="onSort('approvalStatus')">Status</th>
          <th class="px-3 py-2">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products; let i = index" class="border-b">
          <td class="px-3 py-2">{{ (page - 1) * pageSize + i + 1 }}</td>
          <td class="px-3 py-2">{{ product.name }}</td>
          <td class="px-3 py-2">{{ product.description }}</td>
          <td class="px-3 py-2">{{ product.pricePerPiece }}</td>
          <td class="px-3 py-2">{{ product.noInStock }}</td>
          <td class="px-3 py-2">
            <span [ngClass]="{
              'bg-yellow-200 text-yellow-800': product.approvalStatus === 'Pending',
              'bg-green-200 text-green-800': product.approvalStatus === 'Approved',
              'bg-red-200 text-red-800': product.approvalStatus === 'Rejected'
            }" class="px-2 py-1 rounded-full text-xs font-semibold">{{ product.approvalStatus }}</span>
          </td>
          <td class="px-3 py-2 flex gap-2">
            <button class="bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600" (click)="openEdit(product)">Edit</button>
            <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" (click)="deleteProduct(product)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="7" class="text-center text-gray-400 py-6">No products found.</td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- Pagination -->
  <div class="flex justify-center items-center gap-2 mt-4">
    <button class="px-2 py-1 rounded bg-gray-200" [disabled]="page === 1" (click)="onPageChange(page - 1)">&larr;</button>
    <ng-container *ngFor="let p of pages">
      <button class="px-3 py-1 rounded" [ngClass]="p === page ? 'bg-orange-500 text-white' : 'bg-gray-100'" (click)="onPageChange(p)">{{ p }}</button>
    </ng-container>
    <button class="px-2 py-1 rounded bg-gray-200" [disabled]="page === totalPages" (click)="onPageChange(page + 1)">&rarr;</button>
  </div>

  <!-- Modal for Add/Edit -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md relative">
      <button class="absolute top-2 right-2 text-gray-400 hover:text-gray-600" (click)="showModal = false">&times;</button>
      <h3 class="text-lg font-bold mb-4">{{ editProduct ? 'Edit Product' : 'Add Product' }}</h3>
      <form (ngSubmit)="saveProduct()" #productForm="ngForm">
        <div class="mb-3">
          <label class="block mb-1">Name</label>
          <input class="border rounded px-3 py-1 w-full" [(ngModel)]="form.name" name="name" required />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Description</label>
          <input class="border rounded px-3 py-1 w-full" [(ngModel)]="form.description" name="description" required />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Price</label>
          <input type="number" class="border rounded px-3 py-1 w-full" [(ngModel)]="form.pricePerPiece" name="pricePerPiece" required />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Stock</label>
          <input type="number" class="border rounded px-3 py-1 w-full" [(ngModel)]="form.noInStock" name="noInStock" required />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Status</label>
          <select class="border rounded px-3 py-1 w-full" [(ngModel)]="form.approvalStatus" name="approvalStatus" required>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="flex justify-end gap-2 mt-4">
          <button type="button" class="px-4 py-2 rounded bg-gray-200" (click)="showModal = false">Cancel</button>
          <button type="submit" class="px-4 py-2 rounded bg-orange-500 text-white">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
