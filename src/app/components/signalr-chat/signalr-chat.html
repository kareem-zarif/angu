<div class="max-w-2xl mx-auto p-4 bg-gray-50 min-h-screen">
  <h2 class="text-2xl font-bold mb-4">💬 Chat</h2>

  <!-- الرسائل -->
<div class="flex flex-col space-y-2">
  <div *ngFor="let msg of messages"
       class="flex"
       [ngClass]="isMyMessage(msg) ? 'justify-end' : 'justify-start'">

    <div class="relative max-w-[70%] p-3 rounded-lg overflow-visible"
         [ngClass]="isMyMessage(msg) 
           ? 'bg-green-200 text-right rounded-br-none' 
           : 'bg-gray-200 text-left rounded-bl-none'">

      <!-- النص -->
      <div class="text-sm">
        {{ msg.body }}
      </div>

      <!-- النوع + الاسم + التاريخ -->
      <small class="block text-xs text-gray-500 mt-1 flex items-center gap-1"
             [ngClass]="isMyMessage(msg) ? 'justify-end' : 'justify-start'">
        <span class="font-semibold text-gray-700">
          {{ getSenderType(msg) }}
        </span>
        •
        <span>
          {{ msg.senderType?.toLowerCase() === 'customer' ? msg.customerName : msg.supplierName }}
        </span>
        •
        <span>
          {{ msg.messageDateTime | date:'dd/MM/yyyy HH:mm' }}
        </span>
      </small>
<button *ngIf="msg.id" 
        (click)="deleteMessage(msg.id)"
        class="absolute top-1 right-1 text-red-500 bg-white rounded-full shadow p-1 text-xs cursor-pointer">
  🗑
</button>

    </div>
  </div>
</div>

  <!-- المدخلات -->
  <div class="mt-6 space-y-4">
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Sender Type:</label>
        <select [(ngModel)]="senderType"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-2">
          <option value="Customer">Customer</option>
          <option value="Supplier">Supplier</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Sender ID (GUID):</label>
        <input type="text" [(ngModel)]="senderId"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-2" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Receiver ID (GUID):</label>
        <input type="text" [(ngModel)]="receiverId"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-2" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Body:</label>
        <input type="text" [(ngModel)]="messageBody" placeholder="Enter message body"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm p-2" />
      </div>
    </div>

    <div class="flex justify-between">
      <button (click)="joinGroup()"
        class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition">Join Group</button>
      <button (click)="sendMessage()"
        class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 transition">Send</button>
    </div>
  </div>
</div>
